<html>
<head>
    <title>AI Healing Sanctuary</title>
    <script>
        async function callAI(prompt) {
            const response = await fetch('/.netlify/functions/ai', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt })
            });
            const data = await response.json();
            console.log(data);
        }
    </script>
</head>
<body>
    <h1>Welcome to AI Healing Sanctuary</h1>
    <button onclick="callAI('Hello AI')">Call AI</button>
</body>
</html>
