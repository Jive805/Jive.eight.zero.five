[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Build complete'"

[dev]
  command = "npm run dev"
  port = 8888

[[redirects]]
  from = "/.netlify/functions/ai"
  to = "/.netlify/functions/ai"
  status = 200

[context.production]
  environment = { ANTHROPIC_API_KEY = "" }